<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>APA Flow Recorder</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        width: 240px;
        margin: 0;
        padding: 16px;
        color: #172033;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }

      .status {
        border-radius: 8px;
        padding: 10px;
        background: #f1f5f9;
        margin-bottom: 12px;
      }

      .ok {
        color: #166534;
      }

      .bad {
        color: #b91c1c;
      }

      p {
        font-size: 12px;
        line-height: 1.5;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <h1>APA Flow Recorder</h1>
    <div class="status" id="status">正在检测桌面端...</div>
    <p>桌面端启动并开始录制后，在网页中的点击、输入、选择和上传会自动发送到本地录制器。</p>
    <script src="popup.js"></script>
  </body>
</html>
